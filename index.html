<head>
<meta charset="UTF-8">

<title>Dutchman — EPK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }

  .epk-block { position: relative; width: 100%; display: block; }
  .epk-block img.epk-bg { width: 100%; height: auto; display: block; }
  .epk-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .epk-overlay * { pointer-events: auto; }

  /* ── PAGE 1: BEST TRACKS
     Right column: 67%-99% across
     Tracks zone: 18%-68% down
  ── */
  #best-tracks {
    position: absolute;
    top: 18%;
    left: 67%;
    width: 32%;
    height: 50%;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 0 2%;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 5%;
    text-decoration: none;
  }

  .track-item img {
    width: 16%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
  }

  .track-item span {
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(6px, 0.85vw, 13px);
    letter-spacing: 1px;
  }

  .track-item:hover span { opacity: 0.7; }

  /* ── PAGE 1: SOCIALS GRID 2x3
     Socials heading ends at ~83% down, icons fill 83%-100%.
     Icon size is set in vw so it stays proportional to the page width.
  ── */
  #socials-grid {
    position: absolute;
    top: 83%;
    left: 67%;
    width: 32%;
    height: 17%;
    display: flex;
    flex-wrap: wrap;
    align-content: center;
    justify-content: space-evenly;
    row-gap: 1vw;
  }

  .social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 4.2vw;
    height: 4.2vw;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .social-btn:hover { opacity: 0.7; }

  .social-btn img {
    width: 85%;
    height: 85%;
    object-fit: contain;
    display: block;
  }

  /* Twitter's logo fills its source image edge-to-edge, so it reads
     larger than the others at the same box size — scale it down to match. */
  .social-btn.icon-compact img {
    width: 62%;
    height: 62%;
  }

  /* ── PAGE 2: VIDEOS (UNTOUCHED) ── */
  .video-slot { position: absolute; overflow: hidden; background: #000; }
  .video-slot iframe { width: 100%; height: 100%; border: none; display: block; }
  #vid-1097  { top: 19%; left:  1%; width: 47%; height: 49%; }
  #vid-tmn   { top: 19%; left: 50%; width: 49%; height: 49%; }

  /* ── PAGE 3: STREAMING ICONS ── */
  #streaming-icons {
    position: absolute;
    top: 28%;
    left: 1%;
    width: 26%;
    height: 12%;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 6%;
  }

  .stream-icon-link { display: block; width: 18%; flex-shrink: 0; transition: opacity 0.2s; }
  .stream-icon-link:hover { opacity: 0.7; }
  .stream-icon-link img { width: 100%; height: auto; display: block; border-radius: 6px; }

  /* ── PAGE 3: VIDEO ── */
  #vid-1097-epk3 {
    position: absolute;
    top: 54%;
    left: 40%;
    width: 35%;
    height: 35%;
    overflow: hidden;
    background: #000;
  }
  #vid-1097-epk3 iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 40px; font-size: 11px; color: #333; letter-spacing: 2px; border-top: 1px solid #111; }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    #vid-1097, #vid-tmn, #vid-1097-epk3, #streaming-icons, #best-tracks, #socials-grid { display: none; }
    .mobile-fallback { display: block; background: #000; padding: 24px 16px; border-top: 1px solid #111; }
    .mobile-fallback h3 { font-size: 10px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 12px; }
    .mobile-video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-bottom: 24px; }
    .mobile-video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .mobile-icon-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 24px; }
    .mobile-icon-row a img { width: 44px; height: 44px; object-fit: contain; border-radius: 8px; }
    .mobile-track-list { list-style: none; }
    .mobile-track-list li { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #111; }
    .mobile-track-list li img { width: 36px; height: 36px; object-fit: cover; }
    .mobile-track-list li a { color: #ccc; text-decoration: none; font-size: 13px; }
  }

  @media (min-width: 601px) { .mobile-fallback { display: none; } }
</style>
