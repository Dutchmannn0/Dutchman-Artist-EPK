<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutchman — EPK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }

  .epk-block {
    position: relative;
    width: 100%;
    display: block;
  }

  .epk-block img.epk-bg {
    width: 100%;
    height: auto;
    display: block;
  }

  .epk-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .epk-overlay * { pointer-events: auto; }

  /* ── PAGE 1: BEST TRACKS ── */
  #best-tracks {
    position: absolute;
    top: 13%;
    left: 72%;
    width: 26%;
    height: 47%;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 0 1%;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 6%;
    text-decoration: none;
  }

  .track-item img {
    width: 22%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
  }

  .track-item span {
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(7px, 1.1vw, 15px);
    letter-spacing: 1px;
  }

  .track-item:hover span { opacity: 0.7; }

  /* ── PAGE 1: SOCIALS GRID 2x3 ── */
  #socials-grid {
    position: absolute;
    top: 63%;
    left: 70%;
    width: 29%;
    height: 33%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4% 6%;
    align-items: center;
    justify-items: center;
    padding: 2% 1%;
  }

  .social-btn {
    display: block;
    width: 70%;
    aspect-ratio: 1;
    transition: opacity 0.2s;
  }

  .social-btn:hover { opacity: 0.7; }

  .social-btn img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
    display: block;
  }

  /* ── PAGE 2: VIDEOS (DO NOT TOUCH) ── */
  .video-slot {
    position: absolute;
    overflow: hidden;
    background: #000;
  }

  .video-slot iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  #vid-1097 {
    top: 19%;
    left: 1%;
    width: 47%;
    height: 49%;
  }

  #vid-tmn {
    top: 19%;
    left: 50%;
    width: 49%;
    height: 49%;
  }

  /* ── PAGE 3: STREAMING ICONS horizontal ── */
  #streaming-icons {
    position: absolute;
    top: 42%;
    left: 1%;
    width: 26%;
    height: 20%;
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 4%;
  }

  .stream-icon-link {
    display: block;
    width: 20%;
    transition: opacity 0.2s;
  }

  .stream-icon-link:hover { opacity: 0.7; }

  .stream-icon-link img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
  }

  /* ── PAGE 3: 1097 VIDEO ── */
  #vid-1097-epk3 {
    top: 47%;
    left: 27%;
    width: 50%;
    height: 36%;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px;
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    border-top: 1px solid #111;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    #vid-1097, #vid-tmn, #vid-1097-epk3, #streaming-icons, #best-tracks, #socials-grid {
      display: none;
    }
    .mobile-fallback { display: block; background: #000; padding: 24px 16px; border-top: 1px solid #111; }
    .mobile-fallback h3 { font-size: 10px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 12px; }
    .mobile-video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-bottom: 24px; }
    .mobile-video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .mobile-icon-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 24px; }
    .mobile-icon-row a img { width: 44px; height: 44px; object-fit: contain; border-radius: 8px; }
    .mobile-track-list { list-style: none; }
    .mobile-track-list li { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #111; }
    .mobile-track-list li img { width: 36px; height: 36px; object-fit: cover; }
    .mobile-track-list li a { color: #ccc; text-decoration: none; font-size: 13px; }
  }

  @media (min-width: 601px) {
    .mobile-fallback { display: none; }
  }
</style>
