<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutchman — EPK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }

  /* Each EPK block is a positioned container */
  .epk-block {
    position: relative;
    width: 100%;
    display: block;
  }

  .epk-block img.epk-bg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Overlay layer sits on top of the image */
  .epk-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Any interactive element inside overlay needs pointer-events back */
  .epk-overlay * { pointer-events: auto; }

  /* VIDEO EMBEDS — EPK_2 */
  /* Two video slots side by side in the big black space */
  .video-slot {
    position: absolute;
    overflow: hidden;
    background: #000;
  }

  .video-slot iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* EPK_2: left video — 1097 */
  /* Black area starts roughly 19% from top, ends ~68%, left half */
  #vid-1097 {
    top: 19%;
    left: 1%;
    width: 47%;
    height: 49%;
  }

  /* EPK_2: right video — Tell Me Now */
  #vid-tmn {
    top: 19%;
    left: 50%;
    width: 49%;
    height: 49%;
  }

  /* STREAMING ICONS — EPK_3 */
  /* Streaming links column: left ~0-27%, below the heading */
  .streaming-slot {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 4%;
    align-items: center;
    justify-content: center;
  }

  #streaming-icons {
    top: 40%;
    left: 1%;
    width: 26%;
    height: 52%;
  }

  .stream-icon-link {
    display: block;
    width: 22%;
    transition: opacity 0.2s;
  }

  .stream-icon-link:hover { opacity: 0.7; }

  .stream-icon-link img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
  }

  /* EPK_3: 1097 video embed — under "1097 MUSIC VIDEO" heading, middle column */
  #vid-1097-epk3 {
    top: 43%;
    left: 27%;
    width: 55%;
    height: 42%;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 40px;
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    border-top: 1px solid #111;
  }

  /* MOBILE: on small screens the overlay % positions still work
     since they're relative to the image which scales with width.
     But videos get too small under ~500px so we stack them below instead */
  @media (max-width: 600px) {
    #vid-1097, #vid-tmn, #vid-1097-epk3, #streaming-icons {
      display: none;
    }

    .mobile-fallback {
      display: block;
      background: #000;
      padding: 24px 16px;
      border-top: 1px solid #111;
    }

    .mobile-fallback h3 {
      font-size: 10px;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .mobile-video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .mobile-video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .mobile-stream-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .mobile-stream-row a img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 8px;
    }
  }

  @media (min-width: 601px) {
    .mobile-fallback { display: none; }
  }
</style>
</head>
<body>

<!-- EPK PAGE 1 — ARTIST (no overlays needed) -->
<div class="epk-block">
  <img src="EPK_1.png" class="epk-bg" alt="Dutchman Artist EPK">
</div>

<!-- EPK PAGE 2 — MUSIC VIDEOS -->
<div class="epk-block">
  <img src="EPK_2.png" class="epk-bg" alt="Dutchman Music Videos EPK">
  <div class="epk-overlay">
    <div class="video-slot" id="vid-1097">
      <iframe src="https://www.youtube.com/embed/3ak7U2ccQQ0" allowfullscreen></iframe>
    </div>
    <div class="video-slot" id="vid-tmn">
      <iframe src="https://www.youtube.com/embed/2VbjaH5vH2A" allowfullscreen></iframe>
    </div>
  </div>
</div>

<!-- Mobile fallback for EPK_2 videos -->
<div class="mobile-fallback">
  <h3>1097</h3>
  <div class="mobile-video-wrap">
    <iframe src="https://www.youtube.com/embed/3ak7U2ccQQ0" allowfullscreen></iframe>
  </div>
  <h3>Tell Me Now</h3>
  <div class="mobile-video-wrap">
    <iframe src="https://www.youtube.com/embed/2VbjaH5vH2A" allowfullscreen></iframe>
  </div>
</div>

<!-- EPK PAGE 3 — ALBUM BREAKDOWN -->
<div class="epk-block">
  <img src="EPK_3.png" class="epk-bg" alt="N.O.W Album EPK">
  <div class="epk-overlay">

    <!-- Streaming icons in left column -->
    <div class="streaming-slot" id="streaming-icons">
      <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank" class="stream-icon-link" title="SoundCloud">
        <img src="soundcloud_icon.png" alt="SoundCloud">
      </a>
      <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank" class="stream-icon-link" title="Spotify">
        <img src="spotify_icon.png" alt="Spotify">
      </a>
      <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank" class="stream-icon-link" title="Apple Music">
        <img src="apple_music_icon.png" alt="Apple Music">
      </a>
      <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank" class="stream-icon-link" title="YouTube Music">
        <img src="yt_icon.png" alt="YouTube Music">
      </a>
    </div>

    <!-- 1097 video in the middle empty slot -->
    <div class="video-slot" id="vid-1097-epk3">
      <iframe src="https://www.youtube.com/embed/3ak7U2ccQQ0" allowfullscreen></iframe>
    </div>

  </div>
</div>

<!-- Mobile fallback for EPK_3 -->
<div class="mobile-fallback">
  <h3>Stream N.O.W</h3>
  <div class="mobile-stream-row">
    <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank"><img src="soundcloud_icon.png" alt="SoundCloud"></a>
    <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank"><img src="spotify_icon.png" alt="Spotify"></a>
    <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank"><img src="apple_music_icon.png" alt="Apple Music"></a>
    <a href="https://on.soundcloud.com/T5LeWiN3KWZhz3LzFU" target="_blank"><img src="yt_icon.png" alt="YouTube Music"></a>
  </div>
  <br>
  <h3>1097 — Music Video</h3>
  <div class="mobile-video-wrap">
    <iframe src="https://www.youtube.com/embed/3ak7U2ccQQ0" allowfullscreen></iframe>
  </div>
</div>

<footer>
  DUTCHMAN &mdash; dutchmannn0@gmail.com &mdash; Amsterdam &mdash; 2026
</footer>

</body>
</html>
